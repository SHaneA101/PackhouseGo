<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PackhouseGo | Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      background: linear-gradient(135deg, #f7f3df, #e9f4e6);
      color: #243121;
    }
    .card {
      width: min(92vw, 430px);
      background: #fff;
      border: 1px solid #dde8d8;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 1.25rem; }
    p { margin: 0; color: #51624b; }
    a {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      color: #fff;
      background: #2e6f40;
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>PackhouseGo needs an internet connection to load live data.</p>
    <a href="/login.html">Try again</a>
  </div>
</body>
</html>
